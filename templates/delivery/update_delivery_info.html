{% extends 'delivery/delivery_base_dashboard.html' %}

{% block content %}
<div class="container mt-4">
    <h2>Update Delivery Info for Order #{{ purchase.id }}</h2>
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>Status</label>
            <select name="status" class="form-control" required>
                <option value="out_for_delivery" {% if purchase.status == "out_for_delivery" %}selected{% endif %}>Out for Delivery</option>
                <option value="delivered" {% if purchase.status == "delivered" %}selected{% endif %}>Delivered</option>
            </select>
        </div>

        <div class="form-group">
            <label>Current Location</label>
            <input type="text" name="current_location" class="form-control" value="{{ purchase.current_location }}">
        </div>

        <div class="form-group">
            <label>Delivery Date</label>
            <input type="date" name="delivery_date" class="form-control" value="{{ purchase.delivery_date|date:'Y-m-d' }}">
        </div>

        <button type="submit" class="btn btn-primary">Update</button>
        <a href="{% url 'assigned_orders' %}" class="btn btn-secondary">Back</a>
    </form>
</div>
{% endblock %}
