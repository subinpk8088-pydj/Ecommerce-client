{% extends 'base.html' %}

{% block content %}
<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Nunito&display=swap" rel="stylesheet">

<style>
  body {
    font-family: 'Nunito', sans-serif;
    background-color: #f9f6fc;
  }

  .product-card {
    background-color: #fff;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(124, 82, 149, 0.1);
    padding: 20px;
    margin-top: 30px;
  }

  .product-image {
    max-width: 100%;
    border-radius: 10px;
  }

  .delivery-info {
    background-color: #e6d9f5;
    border-radius: 10px;
    padding: 10px 15px;
    margin-top: 15px;
    font-weight: 500;
    color: #4a365e;
  }
</style>

<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="product-card">

        <div class="row g-4 align-items-center">
          <div class="col-md-5 text-center">
            <img src="{{ product.image.url }}" alt="{{ product.name }}" class="product-image">
          </div>

          <div class="col-md-7">
            <h3 class="mb-3">{{ product.name }}</h3>
            <p class="mb-3 text-muted">{{ product.description }}</p>
            <h5 class="text-primary mb-3">${{ product.price }}</h5>

            {% if request.user.is_authenticated %}
              <div class="delivery-info">
                📦 Estimated Delivery: <strong>{{ estimated_delivery }}</strong>
              </div>
            {% else %}
              <div class="alert alert-warning mt-3">
                Please <a href="{% url 'login' %}">log in</a> to see the estimated delivery date.
              </div>
            {% endif %}
          </div>
        </div>

      </div>
    </div>
  </div>
</div>
{% endblock %}
