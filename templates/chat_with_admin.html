{% extends 'base.html' %}
{% load static %}
{% block content %}
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
    body {
        font-family: 'Nunito', sans-serif;
        background-color: #f9f6fb;
    }
    .container {
        animation: fadeIn 0.8s ease-in-out;
    }
    h4 {
        color: #7c5295;
        font-weight: 700;
    }
    .chat-box {
        background: #fff;
        border-radius: 15px;
        box-shadow: 0 8px 20px rgba(124, 82, 149, 0.1);
        padding: 1.5rem;
        height: 300px;
        overflow-y: scroll;
        margin-bottom: 1rem;
        animation: slideUp 0.6s ease-in-out;
    }
    .message {
        border-radius: 10px;
        padding: 0.5rem 1rem;
        margin-bottom: 10px;
        max-width: 70%;
        display: inline-block;
    }
    .text-start .message {
        background-color: #f2e6f8;
        color: #4a3b57;
    }
    .text-end .message {
        background-color: #7c5295;
        color: white;
    }
    .input-group input {
        border-radius: 10px 0 0 10px;
    }
    .btn-primary {
        background-color: #7c5295;
        border: none;
        border-radius: 0 10px 10px 0;
    }
    .btn-primary:hover {
        background-color: #6b4583;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-10px); }
        to { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideUp {
        from { transform: translateY(30px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
    }
</style>

<div class="container mt-4">
    <h4 class="text-center">Chat with Support</h4>
    <div class="chat-box">
        {% for msg in messages %}
            <div class="{% if msg.sender == request.user %}text-end{% else %}text-start{% endif %}">
                <div class="message">
                    <strong>{{ msg.sender.username }}</strong>: {{ msg.message }}
                    <br><small>{{ msg.timestamp }}</small>
                </div>
            </div>
        {% endfor %}
    </div>
    <form method="post">
        {% csrf_token %}
        <div class="input-group">
            <input type="text" name="message" class="form-control" placeholder="Type your message..." required>
            <button class="btn btn-primary">Send</button>
        </div>
    </form>
</div>
{% endblock %}
