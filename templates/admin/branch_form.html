{% extends 'admin/base.html' %}
{% load static %}
{% block content %}

<form id="branchForm" method="post">
  {% csrf_token %}
  <select name="hub" class="form-control" required>
    <option value="">-- Select HUB --</option>
    {% for hub in hubs %}
      <option value="{{ hub.id }}">{{ hub.name }}</option>
    {% endfor %}
  </select>
  <input type="text" name="name" class="form-control" placeholder="Branch Name" required>
  <input type="text" name="address" class="form-control" placeholder="Address" required>
  <input type="email" name="email" class="form-control" placeholder="Email" required>
  <input type="tel" name="phone" class="form-control" placeholder="Phone" required>
  <input type="text" name="pin_code" class="form-control" placeholder="Pin-code" required>
  <input type="text" name="district" class="form-control" placeholder="District" required>
  <input type="text" name="state" class="form-control" placeholder="State" required>
  <input type="text" name="city" class="form-control" placeholder="City" required>
  <button type="submit" class="btn btn-success">Add Branch</button>
</form>

<script>
document.getElementById("branchForm").addEventListener("submit", function(e){
    e.preventDefault();
    const formData = new FormData(this);
    fetch("{% url 'add_branch' %}", {
        method: 'POST',
        headers: {'X-CSRFToken': '{{ csrf_token }}'},
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        if (data.error) {
            alert(data.error);
        } else {
            alert(data.message);
            this.reset();
        }
    });
});
</script>

{% endblock %}
