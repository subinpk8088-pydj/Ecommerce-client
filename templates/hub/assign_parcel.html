{% extends 'hub/hub_base.html' %}

{% block content %}
  <div class="container mt-4">
    <h2>Assign Parcel {{ parcel.tracking_number }} to Branch</h2>

    {% if error %}
      <div class="alert alert-danger">{{ error }}</div>
    {% endif %}

    <form method="post" class="mt-3">
      {% csrf_token %}
      <div class="form-group">
        <label for="assigned_branch">Select Branch</label>
        <select name="assigned_branch" id="assigned_branch" class="form-control" required>
          <option value="">-- Choose a branch --</option>
          {% for branch in branches %}
            <option value="{{ branch.id }}"
              {% if selected_branch|stringformat:"s" == branch.id|stringformat:"s" %}
                selected
              {% endif %}>
              {{ branch.name }} ({{ branch.city }})
            </option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group mt-3">
        <label for="status">Status</label>
        <input type="text" name="status" id="status" class="form-control" value="{{ status }}">
      </div>

      <button type="submit" class="btn btn-primary mt-3">Assign</button>
    </form>
  </div>
{% endblock %}
