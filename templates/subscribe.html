{% extends 'base.html' %}
{% load static %}
{% block content %}
<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
  body {
    font-family: 'Nunito', sans-serif;
    background-color: #fdf9ff;
  }

  .subscription-card {
    background-color: white;
    border-radius: 20px;
    box-shadow: 0 8px 20px rgba(124, 82, 149, 0.15);
    padding: 40px;
    max-width: 600px;
    margin: auto;
    animation: fadeIn 1s ease-in;
  }

  h3 {
    color: #7c5295;
    font-weight: 600;
    animation: slideDown 1s ease-out;
  }

  .form-control {
    border-radius: 12px;
    border: 1px solid #d7cce5;
  }

  .form-control:focus {
    border-color: #7c5295;
    box-shadow: 0 0 0 0.2rem rgba(124, 82, 149, 0.25);
  }

  .btn-primary {
    background-color: #7c5295;
    border-color: #7c5295;
    border-radius: 12px;
    transition: background-color 0.3s ease;
  }

  .btn-primary:hover {
    background-color: #6e4786;
    border-color: #6e4786;
  }

  .alert {
    border-radius: 10px;
    animation: slideUp 0.8s ease-in-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes slideDown {
    from { transform: translateY(-20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
</style>

<div class="container mt-5">
  <div class="subscription-card">
    <h3 class="text-center mb-4">Subscribe to Product Updates</h3>
    <form method="POST" action="{% url 'subscribe_user' %}" class="d-flex justify-content-center">
      {% csrf_token %}
      <input type="email" name="email" class="form-control w-75 me-2" placeholder="Enter your email" required>
      <button type="submit" class="btn btn-primary">Subscribe</button>
    </form>

    {% if messages %}
  <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1055;">
    {% for message in messages %}
      <div class="toast show custom-toast align-items-center text-white shadow fade-in-slide" role="alert">
        <div class="d-flex">
          <div class="toast-body">
            <i class="bi bi-check-circle-fill me-2"></i> {{ message }}
          </div>
          <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
      </div>
    {% endfor %}
  </div>
{% endif %}

<style>
    /* Toast Styling */
.custom-toast {
    background-color: #48c78e; /* Modern soft green */
    border-left: 4px solid #e8dbf2;
    border-radius: 0.75rem;
    font-family: 'Nunito', sans-serif;
    font-size: 0.95rem;
    animation: slideInTopRight 0.7s ease forwards;
}

/* Slide-in Animation */
@keyframes slideInTopRight {
    0% {
        opacity: 0;
        transform: translate(30px, -20px);
    }
    100% {
        opacity: 1;
        transform: translate(0, 0);
    }
}

</style>
  </div>
</div>
{% endblock %}
