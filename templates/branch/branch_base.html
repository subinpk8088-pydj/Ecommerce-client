<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Branch Dashboard</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        /* Color Palette Variables - Matching Hub Dashboard */
        :root {
            --primary: #7c5295;
            --primary-light: #a17eb6;
            --secondary: #e882a6;
            --secondary-light: #ffd3e2;
            --accent: #5cc6d0;
            --neutral: #f8f9fa;
            --neutral-light: #f4f6f9;
            --text-dark: #495057;
            --text-light: #6c757d;
            --text: #495057;
            --white: #ffffff;
            --success: #4caf93;
            --warning: #ffb347;
            --danger: #f67280;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, var(--neutral-light) 0%, #e8f2ff 100%);
            color: var(--text-dark);
            overflow-x: hidden;
        }

        /* Navbar */
        .topnav {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: var(--white);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1040;
            box-shadow: 0 4px 20px rgba(124, 82, 149, 0.3);
            backdrop-filter: blur(10px);
        }

        .nav-brand {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .nav-brand::before {
            content: '\f1ad';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            font-size: 1.8rem;
            color: var(--accent);
        }

        .topnav h5 {
            margin: 0;
            font-weight: 600;
            opacity: 0;
            animation: fadeInLeft 0.8s ease-out 0.2s forwards;
        }

        .nav-user {
            display: flex;
            align-items: center;
            gap: 15px;
            opacity: 0;
            animation: fadeInRight 0.8s ease-out 0.3s forwards;
        }

        .nav-user span {
            font-weight: 500;
        }

        .nav-user::after {
            content: '';
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 1rem;
        }

        .mobile-toggle {
            display: none;
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .mobile-toggle:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.1);
        }

        /* Sidebar */
        .sidebar {
            position: fixed;
            top: 80px;
            left: 0;
            width: 280px;
            height: calc(100% - 80px);
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            padding-top: 2rem;
            box-shadow: 4px 0 20px rgba(0, 0, 0, 0.08);
            z-index: 1030;
            transform: translateX(0);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-y: auto;
        }

        .sidebar.hidden {
            transform: translateX(-100%);
        }

        .sidebar::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--accent), var(--secondary));
        }

        .sidebar a {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 1rem 2rem;
            color: var(--text);
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            opacity: 0;
            transform: translateX(-30px);
            animation: slideInLeft 0.6s ease-out forwards;
        }

        .sidebar a:nth-child(1) { animation-delay: 0.1s; }
        .sidebar a:nth-child(2) { animation-delay: 0.2s; }
        .sidebar a:nth-child(3) { animation-delay: 0.3s; }
        .sidebar a:nth-child(4) { animation-delay: 0.4s; }

        .sidebar a::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(124, 82, 149, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .sidebar a:hover::before {
            left: 100%;
        }

        .sidebar a::after {
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            font-size: 1.2rem;
            width: 20px;
            text-align: center;
        }

        .sidebar a[href*="dashboard"]::after { content: '\f3fd'; }
        .sidebar a[href*="logs"]::after { content: '\f15c'; }
        .sidebar a[href*="agent"]::after { content: '\f0c0'; }
        .sidebar a[href*="logout"]::after { content: '\f2f5'; }

        .sidebar a:hover {
            background: linear-gradient(135deg, var(--secondary-light), rgba(92, 198, 208, 0.1));
            color: var(--primary);
            transform: translateX(10px);
            box-shadow: 0 4px 15px rgba(124, 82, 149, 0.2);
        }

        .sidebar a.active {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: var(--white);
            box-shadow: 0 6px 20px rgba(124, 82, 149, 0.4);
            transform: translateX(5px);
        }

        .sidebar a.text-danger {
            margin-top: auto;
        }

        .sidebar a.text-danger:hover {
            background: linear-gradient(135deg, var(--danger), #ff8a95);
            color: white;
        }

        /* Content Area */
        .content {
            margin-left: 280px;
            padding: 120px 40px 40px;
            min-height: 100vh;
            transition: margin-left 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .content.expanded {
            margin-left: 0;
        }

        /* Card Box Styling */
        .card-box {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            margin-bottom: 2rem;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 0.6s ease-out forwards;
        }

        .card-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--accent), var(--secondary));
        }

        .card-box:hover {
            transform: translateY(-10px);
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.15);
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes fadeInLeft {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes fadeInRight {
            from {
                opacity: 0;
                transform: translateX(30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Backdrop overlay for mobile */
        .backdrop {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1025;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .backdrop.show {
            display: block;
            opacity: 1;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .mobile-toggle {
                display: block;
            }

            .nav-brand {
                order: 2;
            }

            .nav-user span {
                display: none;
            }

            .sidebar {
                position: fixed;
                top: 80px;
                width: 100%;
                height: calc(100vh - 80px);
                transform: translateX(-100%);
                z-index: 1035;
            }

            .sidebar.show {
                transform: translateX(0);
            }

            .content {
                margin-left: 0;
                padding: 100px 20px 20px;
            }

            .topnav {
                padding: 1rem;
                flex-direction: row;
            }

            .card-box {
                padding: 1.5rem;
            }
        }

        @media (max-width: 480px) {
            .content {
                padding: 90px 15px 15px;
            }

            .card-box {
                padding: 1.2rem;
            }

            .sidebar a {
                padding: 0.8rem 1.5rem;
            }

            .topnav h5 {
                font-size: 1.1rem;
            }
        }

        /* Enhanced visual effects */
        .sidebar a {
            border-left: 3px solid transparent;
        }

        .sidebar a:hover {
            border-left-color: var(--primary-light);
        }

        .sidebar a.active {
            border-left-color: var(--accent);
        }

        /* Content block styling */
        .content > * {
            animation-delay: 0.2s;
        }
    </style>
</head>
<body>

<div class="topnav">
    <button class="mobile-toggle" onclick="toggleSidebar()">
        <i class="fas fa-bars"></i>
    </button>
    <div class="nav-brand">
        <h5>Welcome, Branch Manager</h5>
    </div>
    <div class="nav-user">
        <span>Welcome, {{ request.user.username }}</span>
    </div>
</div>

<div class="backdrop" onclick="closeSidebar()"></div>

<div class="sidebar" id="sidebar">
    <a href="{% url 'branch_dashboard' %}" class="active"> Dashboard</a>
<a href="{% url 'branch_assigned_parcels' %}">
  <i class="fas fa-dolly"></i> View Assigned Parcels
</a>
    <a href="#"><i class="fas fa-box"></i> Delivery Logs</a>
    <a href="#"><i class="fas fa-user-cog"></i> Agent Management</a>
    <a href="{% url 'logout' %}" class="text-danger"> Logout</a>
</div>


<div class="content" id="content">
    <!-- Content block will be inserted here -->
        <!-- This is where page-specific content will be injected -->
    {% block content %}

    {% endblock %}
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
<script>
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const backdrop = document.querySelector('.backdrop');
        const content = document.getElementById('content');
        
        if (window.innerWidth <= 768) {
            sidebar.classList.toggle('show');
            backdrop.classList.toggle('show');
        } else {
            sidebar.classList.toggle('hidden');
            content.classList.toggle('expanded');
        }
    }

    function closeSidebar() {
        const sidebar = document.getElementById('sidebar');
        const backdrop = document.querySelector('.backdrop');
        
        sidebar.classList.remove('show');
        backdrop.classList.remove('show');
    }

    // Handle window resize
    window.addEventListener('resize', function() {
        const sidebar = document.getElementById('sidebar');
        const backdrop = document.querySelector('.backdrop');
        const content = document.getElementById('content');
        
        if (window.innerWidth > 768) {
            sidebar.classList.remove('show');
            backdrop.classList.remove('show');
            
            if (sidebar.classList.contains('hidden')) {
                content.classList.add('expanded');
            } else {
                content.classList.remove('expanded');
            }
        } else {
            sidebar.classList.remove('hidden');
            content.classList.remove('expanded');
        }
    });

    // Close sidebar when clicking on nav links in mobile
    document.querySelectorAll('.sidebar a').forEach(link => {
        link.addEventListener('click', function() {
            if (window.innerWidth <= 768) {
                closeSidebar();
            }
        });
    });

    // Add interactive effects to card boxes when they're added
    function observeCardBoxes() {
        const observer = new MutationObserver(function(mutations) {
            mutations.forEach(function(mutation) {
                mutation.addedNodes.forEach(function(node) {
                    if (node.nodeType === 1 && node.classList.contains('card-box')) {
                        node.addEventListener('mouseenter', function() {
                            this.style.transform = 'translateY(-10px) scale(1.02)';
                        });
                        
                        node.addEventListener('mouseleave', function() {
                            this.style.transform = 'translateY(0) scale(1)';
                        });
                    }
                });
            });
        });

        observer.observe(document.getElementById('content'), {
            childList: true,
            subtree: true
        });
    }

    // Initialize observer
    observeCardBoxes();

    // Apply hover effects to existing card boxes
    document.addEventListener('DOMContentLoaded', function() {
        document.querySelectorAll('.card-box').forEach(card => {
            card.addEventListener('mouseenter', function() {
                this.style.transform = 'translateY(-10px) scale(1.02)';
            });
            
            card.addEventListener('mouseleave', function() {
                this.style.transform = 'translateY(0) scale(1)';
            });
        });
    });
</script>

</body>
</html>
